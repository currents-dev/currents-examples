name: demo.playwright.reporter-with-summary
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  basicTests:
    strategy:
      fail-fast: false
      matrix:
        # run 3 copies of the current job in parallel
        shard: [1, 2]
    name: "Playwright Tests - Reporter"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # https://github.com/actions/runner-images/issues/6775
      - run: |
          echo "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install chrome

      - name: Run Basic Tests
        continue-on-error: true
        working-directory: ./setup-ci
        env:
          CURRENTS_PROJECT_ID: ${{ env.CURRENTS_PROJECT_ID }}
          CURRENTS_RECORD_KEY: ${{ secrets.CURRENTS_RECORD_KEY }}
          CURRENTS_CI_BUILD_ID: reporter-${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }} ts --grep @basic

      - name: Show Summary
        if: always()
        working-directory: ./basic
        run: |
          cat currents-report.json

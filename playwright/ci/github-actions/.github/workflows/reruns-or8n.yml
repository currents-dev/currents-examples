name: failed-only-or8n

on:
  push:

jobs:
  test-or8n:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-noble
    env:
      CURRENTS_PROJECT_ID: bnsqNa
      CURRENTS_RECORD_KEY: ${{ secrets.CURRENTS_RECORD_KEY }}
      CURRENTS_CI_BUILD_ID: ${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}
      CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
      CURRENTS_DISCOVERY_FILE: .currents/discovery.txt
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      # https://github.com/actions/runner-images/issues/6775
      - run: |
          echo "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install chrome

      - name: Playwright Last Failed action
        id: last-failed-action
        uses: currents-dev/playwright-last-failed@v2
        with:
          or8n: true
          # debug: true
          # previous-ci-build-id: default is ${{ github.repository }}-${{ github.run_id }}-<%= ${{ github.run_attempt }} - 1 %>
          pw-output-dir: setup-ci/test-results

      - name: Playwright Tests
        working-directory: ./setup-ci
        run: |
          cp ../orchestration/currents.config.ts .
          DISCOVERY_COMMAND="npx pwc-p discover ${{ steps.last-failed-action.outputs.extra-discovery-flags }}"
          echo "Running discovery: $DISCOVERY_COMMAND"
          $DISCOVERY_COMMAND
          COMMAND="npx pwc-p run"
          echo "Running command: $COMMAND"
          $COMMAND
